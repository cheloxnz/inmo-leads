version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: inmobot-mongo
    restart: always
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    container_name: inmobot-backend
    restart: always
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-http://localhost:8001}
        REACT_APP_LANDING_MODE: ${REACT_APP_LANDING_MODE:-inmobiliaria}
        REACT_APP_BUSINESS_NAME: ${REACT_APP_BUSINESS_NAME:-Tu Inmobiliaria}
        REACT_APP_BUSINESS_TAGLINE: ${REACT_APP_BUSINESS_TAGLINE:-Encontra tu propiedad ideal}
        REACT_APP_WHATSAPP_NUMBER: ${REACT_APP_WHATSAPP_NUMBER:-}
    container_name: inmobot-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data:
